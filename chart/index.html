<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticker - 1Y Chart + SMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0b1a2a;
      --muted: #6a7a89;
      --accent: #0e7c86;
      --accent-2: #f2a154;
      --surface: rgba(255, 255, 255, 0.82);
      --line: rgba(11, 26, 42, 0.12);
      --shadow: 0 25px 70px rgba(11, 26, 42, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Source Serif 4", serif;
      background:
        radial-gradient(circle at 15% 20%, #f6f3ea, transparent 55%),
        radial-gradient(circle at 80% 10%, #e7f4f6, transparent 45%),
        linear-gradient(140deg, #f8efe7 0%, #ecf2f8 40%, #f7f5f1 100%);
      display: flex;
      justify-content: center;
      padding: 48px 20px 64px;
    }

    .wrap {
      width: min(1100px, 100%);
      display: grid;
      gap: 20px;
    }

    header {
      display: grid;
      gap: 8px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: var(--muted);
    }

    h1 {
      font-size: clamp(28px, 3.6vw, 44px);
      margin: 0;
      font-weight: 700;
    }

    .subhead {
      font-family: "Source Serif 4", serif;
      font-size: clamp(16px, 2vw, 20px);
      color: var(--muted);
      margin: 0;
      max-width: 720px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      color: var(--muted);
    }

    .meta strong {
      color: var(--ink);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: none;
      background: var(--ink);
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button.secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(11, 26, 42, 0.15);
    }

    .ticker-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .ticker-form input {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: "Space Grotesk", "Source Serif 4", serif;
    }

    .param {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .param input {
      border: none;
      background: transparent;
      padding: 0;
      width: 72px;
      color: var(--ink);
      font-size: 14px;
      font-family: "Space Grotesk", "Source Serif 4", serif;
    }

    .param input:focus {
      outline: none;
    }

    canvas {
      width: 100% !important;
      height: 500px !important;
    }

    .legend {
      display: flex;
      gap: 18px;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .dot.price {
      background: var(--accent);
    }

    .dot.sma {
      background: var(--accent-2);
    }

    .dot.equity {
      background: #17233f;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .metric-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.62);
    }

    .metric-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 700;
      color: var(--ink);
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }

    .range-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0 8px;
    }

    .range-controls button.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 12px 24px rgba(14, 124, 134, 0.18);
    }

    .error {
      color: #b23a48;
      font-weight: 600;
    }

    @media (max-width: 700px) {
      .panel {
        padding: 18px;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      canvas {
        height: 360px !important;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow" id="eyebrow">Covered call backtest</div>
      <h1 id="headline">Ticker strategy</h1>
      <p class="subhead" id="subhead">Runs the covered-call plus moving-average timeout strategy over the full available history.</p>
    </header>

    <section class="panel">
      <div class="meta">
        <div>Data: <strong id="data-source">Stooq daily</strong></div>
        <div id="latest">Latest close: --</div>
        <div class="actions">
          <form class="ticker-form" id="ticker-form">
            <input id="ticker-input" type="text" inputmode="latin" autocomplete="off" spellcheck="false" aria-label="Ticker">
            <label class="param">MA <input id="sma-input" type="number" min="2" step="1" aria-label="Moving average window"></label>
            <label class="param">Delta <input id="delta-input" type="number" min="0.01" max="0.99" step="0.01" aria-label="Call delta"></label>
            <label class="param">Delay <input id="delay-input" type="number" min="0" step="1" aria-label="Delay days"></label>
            <label class="param">Term <input id="option-days-input" type="number" min="1" step="1" aria-label="Option days"></label>
            <button type="submit" class="secondary">Run</button>
          </form>
          <button id="refresh">Refresh</button>
          <button class="secondary" id="toggle">Hide SMA</button>
        </div>
      </div>
      <div style="margin-top: 18px;">
        <div class="range-controls" id="range-controls">
          <button type="button" class="secondary" data-range="1M">1M</button>
          <button type="button" class="secondary" data-range="3M">3M</button>
          <button type="button" class="secondary" data-range="6M">6M</button>
          <button type="button" class="secondary" data-range="1Y">1Y</button>
          <button type="button" class="secondary" data-range="3Y">3Y</button>
          <button type="button" class="secondary" data-range="5Y">5Y</button>
          <button type="button" class="secondary" data-range="MAX">Max</button>
        </div>
        <canvas id="chart"></canvas>
      </div>
      <div class="legend">
        <span><span class="dot price"></span>Close</span>
        <span><span class="dot sma"></span><span id="sma-legend-label">SMA 200</span></span>
        <span><span class="dot equity"></span>Strategy equity</span>
      </div>
      <div class="metrics">
        <div class="metric-card">
          <div class="metric-label">Final Equity</div>
          <div class="metric-value" id="metric-final">$--</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">CAGR</div>
          <div class="metric-value" id="metric-cagr">--</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Max Drawdown</div>
          <div class="metric-value" id="metric-maxdd">--</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Regime</div>
          <div class="metric-value" id="metric-regime">--</div>
        </div>
      </div>
      <div class="status" id="status">Loading data...</div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script>
    const DEFAULT_TICKER = "VOO";
    const statusEl = document.getElementById("status");
    const latestEl = document.getElementById("latest");
    const refreshBtn = document.getElementById("refresh");
    const toggleBtn = document.getElementById("toggle");
    const dataSourceEl = document.getElementById("data-source");
    const headlineEl = document.getElementById("headline");
    const subheadEl = document.getElementById("subhead");
    const eyebrowEl = document.getElementById("eyebrow");
    const tickerForm = document.getElementById("ticker-form");
    const tickerInput = document.getElementById("ticker-input");
    const smaInput = document.getElementById("sma-input");
    const deltaInput = document.getElementById("delta-input");
    const delayInput = document.getElementById("delay-input");
    const optionDaysInput = document.getElementById("option-days-input");
    const rangeControlsEl = document.getElementById("range-controls");
    const smaLegendLabelEl = document.getElementById("sma-legend-label");
    const metricFinalEl = document.getElementById("metric-final");
    const metricCagrEl = document.getElementById("metric-cagr");
    const metricMaxDdEl = document.getElementById("metric-maxdd");
    const metricRegimeEl = document.getElementById("metric-regime");
    const DEFAULT_SMA_WINDOW = 120;
    const DEFAULT_OPTION_DAYS = 10;
    const DEFAULT_DELAY_DAYS = 10;
    const DEFAULT_DELTA = 0.20;
    const STARTING_EQUITY = 1000;
    const CASH_RATE = 0.04;
    const DAYS_PER_YEAR = 252;
    let chart;
    let smaVisible = true;
    let currentDataSource = "";
    let latestPoints = [];
    let latestSmaSeries = [];
    let latestEquitySeries = [];
    let activeRange = "MAX";

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status error" : "status";
    }

    function normalizeTicker(raw) {
      if (!raw) {
        return DEFAULT_TICKER;
      }
      const upper = raw.toUpperCase().trim();
      const cleaned = upper.replace(/[^A-Z0-9.\-]/g, "");
      return cleaned || DEFAULT_TICKER;
    }

    function tickerFromPath() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      const chartIndex = parts.indexOf("chart");
      if (chartIndex === -1) {
        return "";
      }
      const candidate = parts[chartIndex + 1];
      if (!candidate || candidate.toLowerCase() === "index.html") {
        return "";
      }
      return candidate;
    }

    function getTicker() {
      const params = new URLSearchParams(window.location.search);
      return normalizeTicker(params.get("t") || params.get("ticker") || tickerFromPath() || DEFAULT_TICKER);
    }

    function getParamValue(names) {
      const params = new URLSearchParams(window.location.search);
      for (const name of names) {
        const value = params.get(name);
        if (value !== null && value !== "") {
          return value;
        }
      }
      return "";
    }

    function parseIntParam(names, fallback, minValue) {
      const parsed = Number.parseInt(getParamValue(names), 10);
      if (!Number.isFinite(parsed) || parsed < minValue) {
        return fallback;
      }
      return parsed;
    }

    function parseFloatParam(names, fallback, minValue, maxValue) {
      const parsed = Number.parseFloat(getParamValue(names));
      if (!Number.isFinite(parsed) || parsed < minValue || parsed > maxValue) {
        return fallback;
      }
      return parsed;
    }

    function getSmaWindow() {
      return parseIntParam(["SMA", "sma", "MA", "ma"], DEFAULT_SMA_WINDOW, 2);
    }

    function getOptionDays() {
      return parseIntParam(["OPTION_DAYS", "option_days", "optionDays", "term"], DEFAULT_OPTION_DAYS, 1);
    }

    function getDelayDays() {
      return parseIntParam(["DELAY", "delay", "delay_days", "delayDays"], DEFAULT_DELAY_DAYS, 0);
    }

    function getDelta() {
      return parseFloatParam(["DELTA", "delta"], DEFAULT_DELTA, 0.01, 0.99);
    }

    function resolveSymbol(ticker) {
      if (ticker.includes(".")) {
        return ticker;
      }
      return ticker + ".US";
    }

    function buildDataUrl(ticker) {
      const cacheBuster = Date.now();
      return "/cgi-bin/fetch_prices.csv?t=" + encodeURIComponent(ticker) + "&cb=" + cacheBuster;
    }

    function parseCsv(text) {
      const lines = text.trim().split("\n");
      const data = [];
      for (let i = 1; i < lines.length; i += 1) {
        const [date, open, high, low, close, volume] = lines[i].split(",");
        if (!date || close === "") {
          continue;
        }
        const parts = date.split("-");
        if (parts.length !== 3) {
          continue;
        }
        const year = Number(parts[0]);
        const monthIndex = Number(parts[1]) - 1;
        const dayOfMonth = Number(parts[2]);
        const day = new Date(year, monthIndex, dayOfMonth);
        const closeNum = Number(close);
        if (Number.isFinite(closeNum)) {
          data.push({
            date: day,
            open: Number(open),
            high: Number(high),
            low: Number(low),
            close: closeNum,
            volume: Number(volume || 0)
          });
        }
      }
      data.sort((left, right) => left.date - right.date);
      return data;
    }

    function computeSma(points, windowSize) {
      const sma = new Array(points.length).fill(null);
      let sum = 0;
      for (let i = 0; i < points.length; i += 1) {
        sum += points[i].close;
        if (i >= windowSize) {
          sum -= points[i - windowSize].close;
        }
        if (i >= windowSize - 1) {
          sma[i] = sum / windowSize;
        }
      }
      return sma;
    }

    function erfApprox(x) {
      const sign = x < 0 ? -1 : 1;
      const absX = Math.abs(x);
      const a1 = 0.254829592;
      const a2 = -0.284496736;
      const a3 = 1.421413741;
      const a4 = -1.453152027;
      const a5 = 1.061405429;
      const p = 0.3275911;
      const t = 1 / (1 + p * absX);
      const y = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-absX * absX);
      return sign * y;
    }

    function normCdf(x) {
      return 0.5 * (1 + erfApprox(x / Math.sqrt(2)));
    }

    function callDelta(spot, strike, timeToExpiry, rate, sigma) {
      if (sigma <= 0 || timeToExpiry <= 0 || spot <= 0 || strike <= 0) {
        return 0;
      }
      const d1 = (Math.log(spot / strike) + (rate + 0.5 * sigma * sigma) * timeToExpiry) / (sigma * Math.sqrt(timeToExpiry));
      return normCdf(d1);
    }

    function callPrice(spot, strike, timeToExpiry, rate, sigma) {
      if (timeToExpiry <= 0 || sigma <= 0 || spot <= 0 || strike <= 0) {
        return Math.max(0, spot - strike);
      }
      const sqrtT = Math.sqrt(timeToExpiry);
      const d1 = (Math.log(spot / strike) + (rate + 0.5 * sigma * sigma) * timeToExpiry) / (sigma * sqrtT);
      const d2 = d1 - sigma * sqrtT;
      return spot * normCdf(d1) - strike * Math.exp(-rate * timeToExpiry) * normCdf(d2);
    }

    function findStrike(spot, timeToExpiry, rate, sigma, targetDelta) {
      let bestStrike = spot;
      let bestError = Number.POSITIVE_INFINITY;
      for (let i = 0; i < 400; i += 1) {
        const strike = spot * (0.90 + (0.30 * i / 399));
        const error = Math.abs(callDelta(spot, strike, timeToExpiry, rate, sigma) - targetDelta);
        if (error < bestError) {
          bestError = error;
          bestStrike = strike;
        }
      }
      return bestStrike;
    }

    function sampleStdDev(values) {
      if (values.length < 2) {
        return 0;
      }
      const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
      let squared = 0;
      for (const value of values) {
        const diff = value - mean;
        squared += diff * diff;
      }
      return Math.sqrt(squared / (values.length - 1));
    }

    function estimateSigma(points, endIndexExclusive) {
      const start = Math.max(1, endIndexExclusive - 20);
      const returns = [];
      for (let i = start; i < endIndexExclusive; i += 1) {
        const prior = points[i - 1].close;
        const current = points[i].close;
        if (prior > 0 && current > 0) {
          returns.push(current / prior - 1);
        }
      }
      if (returns.length < 2) {
        return 0.20;
      }
      return sampleStdDev(returns) * Math.sqrt(DAYS_PER_YEAR);
    }

    function optionMarketValue(activeOption, spot, index) {
      if (!activeOption) {
        return 0;
      }
      const remainingDays = Math.max(activeOption.expirationIndex - index, 0);
      const timeToExpiry = remainingDays > 0 ? remainingDays / DAYS_PER_YEAR : 0;
      return callPrice(spot, activeOption.strike, timeToExpiry, CASH_RATE, activeOption.sigma);
    }

    function simulateStrategy(points, config) {
      const smaSeries = computeSma(points, config.smaWindow);
      let invested = true;
      let shares = STARTING_EQUITY / points[0].close;
      let cash = 0;
      let activeOption = null;
      let reentryIndex = -1;
      let currentRegime = "Invested";
      const equitySeries = [];

      for (let i = 0; i < points.length; i += 1) {
        const price = points[i].close;
        const sma = smaSeries[i];
        const hasSma = sma !== null;
        let justExited = false;

        if (invested && activeOption && activeOption.expirationIndex === i) {
          const settledEquity = cash + shares * price - shares * Math.max(0, price - activeOption.strike);
          shares = settledEquity / price;
          cash = 0;
          activeOption = null;
        }

        if (invested && hasSma && price < sma) {
          const optionValue = optionMarketValue(activeOption, price, i);
          cash = cash + shares * price - shares * optionValue;
          shares = 0;
          activeOption = null;
          invested = false;
          reentryIndex = i + config.delayDays;
          currentRegime = "Cash timeout";
          justExited = true;
        }

        if (!invested) {
          if (!justExited) {
            cash *= 1 + CASH_RATE / DAYS_PER_YEAR;
          }
          if (hasSma && i >= reentryIndex && price > sma) {
            invested = true;
            shares = cash / price;
            cash = 0;
            currentRegime = "Invested";
          }
        }

        if (invested && !activeOption) {
          const expirationIndex = Math.min(i + config.optionDays, points.length - 1);
          const timeToExpiry = Math.max((expirationIndex - i) / DAYS_PER_YEAR, 1 / DAYS_PER_YEAR);
          const sigma = estimateSigma(points, i);
          const strike = findStrike(price, timeToExpiry, CASH_RATE, sigma, config.delta);
          const premium = callPrice(price, strike, timeToExpiry, CASH_RATE, sigma);
          cash += shares * premium;
          activeOption = {
            strike,
            sigma,
            expirationIndex
          };
        }

        const optionValue = invested ? optionMarketValue(activeOption, price, i) : 0;
        const equity = invested ? cash + shares * price - shares * optionValue : cash;
        equitySeries.push(equity);
      }

      return {
        smaSeries,
        equitySeries,
        currentRegime
      };
    }

    function formatDate(date) {
      return date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function formatMoney(value) {
      return value.toLocaleString(undefined, {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      });
    }

    function formatPercent(value) {
      return (value * 100).toFixed(2) + "%";
    }

    function computeStats(equitySeries) {
      const finalEquity = equitySeries[equitySeries.length - 1];
      const years = Math.max((equitySeries.length - 1) / DAYS_PER_YEAR, 1 / DAYS_PER_YEAR);
      const cagr = Math.pow(finalEquity / STARTING_EQUITY, 1 / years) - 1;
      let peak = equitySeries[0];
      let maxDrawdown = 0;
      for (const value of equitySeries) {
        if (value > peak) {
          peak = value;
        }
        const drawdown = value / peak - 1;
        if (drawdown < maxDrawdown) {
          maxDrawdown = drawdown;
        }
      }
      return {
        finalEquity,
        cagr,
        maxDrawdown
      };
    }

    function shiftDate(date, months) {
      return new Date(date.getFullYear(), date.getMonth() + months, date.getDate());
    }

    function rangeStartDate(lastDate, range) {
      switch (range) {
        case "1M":
          return shiftDate(lastDate, -1);
        case "3M":
          return shiftDate(lastDate, -3);
        case "6M":
          return shiftDate(lastDate, -6);
        case "1Y":
          return shiftDate(lastDate, -12);
        case "3Y":
          return shiftDate(lastDate, -36);
        case "5Y":
          return shiftDate(lastDate, -60);
        default:
          return null;
      }
    }

    function sliceSeriesByRange(points, smaSeries, equitySeries, range) {
      if (!points.length || range === "MAX") {
        return { points, smaSeries, equitySeries };
      }

      const startDate = rangeStartDate(points[points.length - 1].date, range);
      if (!startDate) {
        return { points, smaSeries, equitySeries };
      }

      let startIndex = points.findIndex((point) => point.date >= startDate);
      if (startIndex === -1) {
        startIndex = 0;
      }

      return {
        points: points.slice(startIndex),
        smaSeries: smaSeries.slice(startIndex),
        equitySeries: equitySeries.slice(startIndex)
      };
    }

    function updateRangeButtons() {
      const buttons = rangeControlsEl.querySelectorAll("button[data-range]");
      for (const button of buttons) {
        button.classList.toggle("active", button.dataset.range === activeRange);
      }
    }

    function renderChartRange(config) {
      const sliced = sliceSeriesByRange(latestPoints, latestSmaSeries, latestEquitySeries, activeRange);
      buildChart(sliced.points, sliced.smaSeries, sliced.equitySeries, config);

      if (sliced.points.length) {
        setStatus(
          "Showing " + sliced.points.length + " trading days from " +
          formatDate(sliced.points[0].date) + " to " + formatDate(sliced.points[sliced.points.length - 1].date) +
          (activeRange === "MAX" ? "." : " (" + activeRange + " view).")
        );
      }

      updateRangeButtons();
    }

    function buildChart(points, smaSeries, equitySeries, config) {
      const ctx = document.getElementById("chart").getContext("2d");
      const labels = points.map((point) => point.date);
      const prices = points.map((point) => point.close);
      const maSeries = smaSeries.map((value) => (value ? Number(value.toFixed(2)) : null));
      const roundedEquity = equitySeries.map((value) => Number(value.toFixed(2)));

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Close",
              data: prices,
              borderColor: "#0e7c86",
              backgroundColor: "rgba(14, 124, 134, 0.10)",
              borderWidth: 2,
              fill: false,
              pointRadius: 0,
              tension: 0.15,
              yAxisID: "price"
            },
            {
              label: "SMA " + config.smaWindow,
              data: maSeries,
              borderColor: "#f2a154",
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.1,
              yAxisID: "price"
            },
            {
              label: "Strategy equity",
              data: roundedEquity,
              borderColor: "#17233f",
              backgroundColor: "rgba(23, 35, 63, 0.08)",
              borderWidth: 2.5,
              pointRadius: 0,
              tension: 0.1,
              yAxisID: "equity"
            }
          ]
        },
        options: {
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                title: (items) => {
                  if (!items.length) {
                    return "";
                  }
                  const value = items[0].parsed.x;
                  if (value === null || value === undefined) {
                    return "";
                  }
                  return formatDate(new Date(value));
                },
                label: (context) => {
                  const value = context.parsed.y;
                  if (value === null || value === undefined) {
                    return context.dataset.label + ": --";
                  }
                  return context.dataset.label + ": " + value.toLocaleString(undefined, {
                    style: "currency",
                    currency: "USD",
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                  });
                }
              }
            }
          },
          scales: {
            x: {
              type: "time",
              time: {
                unit: "month"
              },
              grid: {
                color: "rgba(11, 26, 42, 0.06)"
              }
            },
            price: {
              type: "logarithmic",
              position: "left",
              ticks: {
                callback: (value) => "$" + value
              },
              grid: {
                color: "rgba(11, 26, 42, 0.06)"
              }
            },
            equity: {
              type: "logarithmic",
              position: "right",
              ticks: {
                callback: (value) => "$" + Math.round(value).toLocaleString()
              },
              grid: {
                drawOnChartArea: false
              }
            }
          }
        }
      });

      chart.data.datasets[1].hidden = !smaVisible;
      chart.update();
    }

    async function fetchCsv(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("HTTP " + response.status);
      }
      return {
        text: await response.text(),
        source: response.headers.get("X-Data-Source") || ""
      };
    }

    async function loadData(ticker, config) {
      const dataUrl = buildDataUrl(ticker);
      setStatus("Fetching " + ticker + "...");
      try {
        const { text, source } = await fetchCsv(dataUrl);
        const points = parseCsv(text);
        if (points.length < config.smaWindow + 20) {
          throw new Error("Not enough data for SMA " + config.smaWindow + ".");
        }
        currentDataSource = source;
        const simulation = simulateStrategy(points, config);
        const stats = computeStats(simulation.equitySeries);
        latestPoints = points;
        latestSmaSeries = simulation.smaSeries;
        latestEquitySeries = simulation.equitySeries;
        renderChartRange(config);

        const latest = points[points.length - 1];
        latestEl.textContent = "Latest close: $" + latest.close.toFixed(2) + " (" + formatDate(latest.date) + ")";
        dataSourceEl.textContent = currentDataSource || ("Daily prices (" + ticker + ")");
        metricFinalEl.textContent = formatMoney(stats.finalEquity);
        metricCagrEl.textContent = formatPercent(stats.cagr);
        metricMaxDdEl.textContent = formatPercent(stats.maxDrawdown);
        metricRegimeEl.textContent = simulation.currentRegime;
      } catch (error) {
        console.error(error);
        currentDataSource = "";
        latestPoints = [];
        latestSmaSeries = [];
        latestEquitySeries = [];
        metricFinalEl.textContent = "$--";
        metricCagrEl.textContent = "--";
        metricMaxDdEl.textContent = "--";
        metricRegimeEl.textContent = "--";
        setStatus("Could not load data for " + ticker + ".", true);
      }
    }

    function updateCopy(ticker, config) {
      const symbol = resolveSymbol(ticker);
      document.title = ticker + " covered call backtest";
      eyebrowEl.textContent = ticker + " covered call backtest";
      headlineEl.textContent = ticker + " strategy with " + config.smaWindow + "-day MA";
      subheadEl.textContent = "Full-history backtest with " + formatPercent(config.delta) + " delta calls, " + config.optionDays + "-day option terms, a " + config.delayDays + "-day cooldown after MA breakdowns, and 4% cash yield while out of market.";
      dataSourceEl.textContent = currentDataSource || ("Daily prices (" + symbol + ")");
      smaLegendLabelEl.textContent = "SMA " + config.smaWindow;
      tickerInput.value = ticker;
      smaInput.value = String(config.smaWindow);
      deltaInput.value = config.delta.toFixed(2);
      delayInput.value = String(config.delayDays);
      optionDaysInput.value = String(config.optionDays);
    }

    function buildTargetUrl(raw, config) {
      const nextTicker = normalizeTicker(raw);
      return (
        "/chart/" + encodeURIComponent(nextTicker) +
        "?SMA=" + encodeURIComponent(config.smaWindow) +
        "&DELTA=" + encodeURIComponent(config.delta.toFixed(2)) +
        "&DELAY=" + encodeURIComponent(config.delayDays) +
        "&OPTION_DAYS=" + encodeURIComponent(config.optionDays)
      );
    }

    function readFormConfig() {
      return {
        smaWindow: Math.max(2, Number.parseInt(smaInput.value || String(DEFAULT_SMA_WINDOW), 10)),
        delta: Math.min(0.99, Math.max(0.01, Number.parseFloat(deltaInput.value || String(DEFAULT_DELTA)))),
        delayDays: Math.max(0, Number.parseInt(delayInput.value || String(DEFAULT_DELAY_DAYS), 10)),
        optionDays: Math.max(1, Number.parseInt(optionDaysInput.value || String(DEFAULT_OPTION_DAYS), 10))
      };
    }

    function rerunFromInputs(pushHistory) {
      const nextTicker = normalizeTicker(tickerInput.value);
      const nextConfig = readFormConfig();
      const target = buildTargetUrl(nextTicker, nextConfig);
      if (pushHistory) {
        window.location.assign(target);
        return;
      }
      window.history.replaceState({}, "", target);
      updateCopy(nextTicker, nextConfig);
      loadData(nextTicker, nextConfig);
    }

    const ticker = getTicker();
    const config = {
      smaWindow: getSmaWindow(),
      delta: getDelta(),
      delayDays: getDelayDays(),
      optionDays: getOptionDays()
    };
    updateRangeButtons();
    updateCopy(ticker, config);
    loadData(ticker, config);

    refreshBtn.addEventListener("click", () => rerunFromInputs(false));
    rangeControlsEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-range]");
      if (!button || !latestPoints.length) {
        return;
      }
      activeRange = button.dataset.range || "MAX";
      renderChartRange(readFormConfig());
    });
    toggleBtn.addEventListener("click", () => {
      smaVisible = !smaVisible;
      if (chart) {
        chart.data.datasets[1].hidden = !smaVisible;
        chart.update();
        toggleBtn.textContent = smaVisible ? "Hide SMA" : "Show SMA";
      }
    });

    tickerForm.addEventListener("submit", (event) => {
      event.preventDefault();
      rerunFromInputs(true);
    });
  </script>
</body>
</html>
